<style>
  :root {
    --navy:#0f1f3d; --navy-mid:#162847; --navy-light:#1e3460;
    --teal:#0d9488; --teal-light:#14b8a6;
    --gold:#f59e0b; --gold-light:#fbbf24;
    --cream:#fef9f0; --text-light:#e2e8f0; --text-muted:#94a3b8;
    --green:#34d399; --red:#f43f5e; --purple:#a78bfa;
    --radius:16px; --radius-sm:10px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'DM Sans',sans-serif; background:var(--navy); color:var(--text-light); min-height:100vh; overflow-x:hidden; }
  body::before { content:''; position:fixed; inset:0; background-image: linear-gradient(rgba(255,255,255,0.025) 1px,transparent 1px), linear-gradient(90deg,rgba(255,255,255,0.025) 1px,transparent 1px); background-size:40px 40px; pointer-events:none; z-index:0; }

  nav { position:relative; z-index:10; display:flex; align-items:center; justify-content:space-between; padding:1rem 1.5rem; border-bottom:1px solid rgba(255,255,255,0.08); }
  .nav-logo { display:flex; align-items:center; gap:0.5rem; text-decoration:none; }
  .nav-logo-icon { width:32px; height:32px; background:var(--teal); border-radius:7px; display:flex; align-items:center; justify-content:center; font-size:16px; }
  .nav-logo-text { font-family:'Playfair Display',serif; font-size:1.25rem; font-weight:700; color:var(--cream); }
  .nav-logo-text span { color:var(--teal-light); }
  .nav-back { font-size:0.82rem; color:var(--text-muted); text-decoration:none; transition:color 0.15s; }
  .nav-back:hover { color:var(--teal-light); }

  /* ── SCREENS ── */
  .screen { display:none; }
  .screen.active { display:block; }

  /* ══════════════════════════════════════
     MAP SCREEN
  ══════════════════════════════════════ */
  #mapScreen {
    position:relative; z-index:1;
    max-width:720px; margin:0 auto;
    padding:2rem 1.5rem 4rem;
  }

  .map-header { text-align:center; margin-bottom:2.5rem; }
  .map-header h1 { font-family:'Playfair Display',serif; font-size:clamp(1.8rem,4vw,2.6rem); font-weight:900; color:var(--cream); margin-bottom:0.4rem; }
  .map-header p { font-size:0.92rem; color:var(--text-muted); }

  /* overall progress bar */
  .overall-progress { margin-bottom:2.5rem; }
  .overall-progress-label { display:flex; justify-content:space-between; font-size:0.78rem; color:var(--text-muted); margin-bottom:0.5rem; font-weight:500; }
  .overall-progress-label span { color:var(--gold); }
  .progress-track { height:8px; background:rgba(255,255,255,0.08); border-radius:4px; overflow:hidden; }
  .progress-fill-bar { height:100%; background:linear-gradient(90deg,var(--teal),var(--green)); border-radius:4px; transition:width 0.6s ease; }

  /* continent cards */
  .continents-grid { display:flex; flex-direction:column; gap:1rem; }

  .continent-card {
    position:relative;
    background:rgba(255,255,255,0.04);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:var(--radius);
    overflow:hidden;
    cursor:pointer;
    transition:transform 0.2s ease, border-color 0.2s ease, background 0.2s ease;
  }
  .continent-card:hover:not(.locked) { transform:translateY(-2px); border-color:rgba(255,255,255,0.18); background:rgba(255,255,255,0.07); }
  .continent-card.locked { cursor:default; opacity:0.55; }
  .continent-card.completed { border-color:rgba(52,211,153,0.3); background:rgba(52,211,153,0.05); }

  .continent-card-inner { display:flex; align-items:center; gap:1.2rem; padding:1.2rem 1.4rem; }

  .continent-icon { font-size:2.2rem; flex-shrink:0; width:56px; text-align:center; }

  .continent-info { flex:1; min-width:0; }
  .continent-name { font-family:'Playfair Display',serif; font-size:1.2rem; font-weight:700; color:var(--cream); margin-bottom:0.15rem; }
  .continent-meta { font-size:0.78rem; color:var(--text-muted); }

  .continent-status { flex-shrink:0; text-align:right; }
  .status-badge { display:inline-flex; align-items:center; gap:0.3rem; font-size:0.72rem; font-weight:600; letter-spacing:0.06em; text-transform:uppercase; padding:0.25rem 0.65rem; border-radius:100px; }
  .badge-locked    { background:rgba(255,255,255,0.06); color:var(--text-muted); border:1px solid rgba(255,255,255,0.1); }
  .badge-unlocked  { background:rgba(245,158,11,0.12); color:var(--gold); border:1px solid rgba(245,158,11,0.25); }
  .badge-completed { background:rgba(52,211,153,0.12); color:var(--green); border:1px solid rgba(52,211,153,0.25); }

  /* mini flag strip inside card */
  .continent-flags { display:flex; gap:0.35rem; padding:0 1.4rem 1rem; flex-wrap:wrap; }
  .continent-flags img { width:36px; height:24px; object-fit:cover; border-radius:3px; opacity:0.7; }

  /* accent bar on left */
  .continent-card::before { content:''; position:absolute; left:0; top:0; bottom:0; width:3px; background:var(--c-accent,var(--teal)); opacity:0; transition:opacity 0.2s; }
  .continent-card:not(.locked)::before { opacity:1; }

  /* ══════════════════════════════════════
     LEARN SCREEN
  ══════════════════════════════════════ */
  #learnScreen {
    position:relative; z-index:1;
    max-width:680px; margin:0 auto;
    padding:1.5rem 1.5rem 4rem;
  }

  .learn-header { display:flex; align-items:center; gap:1rem; margin-bottom:1.5rem; flex-wrap:wrap; }
  .learn-back { font-size:0.82rem; color:var(--text-muted); cursor:pointer; background:none; border:none; transition:color 0.15s; }
  .learn-back:hover { color:var(--teal-light); }
  .learn-title { font-family:'Playfair Display',serif; font-size:1.4rem; font-weight:700; color:var(--cream); flex:1; }
  .learn-progress-label { font-size:0.78rem; color:var(--text-muted); white-space:nowrap; }

  .learn-progress-track { height:4px; background:rgba(255,255,255,0.08); border-radius:2px; margin-bottom:1.5rem; overflow:hidden; }
  .learn-progress-fill { height:100%; border-radius:2px; transition:width 0.4s ease; }

  /* flag learn card */
  .learn-card {
    background:var(--navy-mid);
    border:1px solid rgba(255,255,255,0.1);
    border-radius:var(--radius);
    overflow:hidden;
    margin-bottom:1rem;
    animation:slide-up 0.3s ease both;
  }
  @keyframes slide-up { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }

  .learn-flag-wrap { width:100%; aspect-ratio:16/7; overflow:hidden; background:rgba(0,0,0,0.3); }
  .learn-flag-wrap img { width:100%; height:100%; object-fit:contain; padding:1rem; display:block; }

  .learn-card-body { padding:1.3rem 1.5rem 1.5rem; }
  .learn-card-continent { font-size:0.68rem; font-weight:600; letter-spacing:0.1em; text-transform:uppercase; margin-bottom:0.3rem; }
  .learn-card-name { font-family:'Playfair Display',serif; font-size:1.8rem; font-weight:900; color:var(--cream); margin-bottom:0.2rem; }
  .learn-card-capital { font-size:0.85rem; color:var(--text-muted); margin-bottom:1.2rem; }

  .learn-fact-section { margin-bottom:0.9rem; }
  .learn-fact-label { font-size:0.68rem; font-weight:600; letter-spacing:0.1em; text-transform:uppercase; color:var(--text-muted); margin-bottom:0.35rem; display:flex; align-items:center; gap:0.4rem; }
  .learn-fact-label::after { content:''; flex:1; height:1px; background:rgba(255,255,255,0.07); }
  .learn-fact-text { font-size:0.88rem; color:var(--text-light); line-height:1.65; }

  .learn-nav { display:flex; gap:0.7rem; align-items:center; }
  .btn-learn-prev { width:44px; height:44px; border-radius:50%; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); color:var(--text-light); font-size:1rem; cursor:pointer; transition:all 0.15s; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .btn-learn-prev:hover:not(:disabled) { background:rgba(255,255,255,0.12); }
  .btn-learn-prev:disabled { opacity:0.3; cursor:default; }
  .btn-learn-next { flex:1; padding:0.85rem; border:none; border-radius:var(--radius-sm); font-family:'DM Sans',sans-serif; font-size:0.95rem; font-weight:600; cursor:pointer; transition:transform 0.15s, opacity 0.15s; }
  .btn-learn-next:hover { transform:translateY(-2px); opacity:0.9; }

  

  /* ══════════════════════════════════════
     RESULT SCREEN
  ══════════════════════════════════════ */
  #resultScreen {
    position:relative; z-index:1;
    max-width:500px; margin:0 auto;
    padding:2rem 1.5rem 4rem;
    flex-direction:column; align-items:center;
    text-align:center; gap:1.2rem;
  }
  #resultScreen.active { display:flex; }

  .result-emoji-big { font-size:4rem; }
  .result-screen-title { font-family:'Playfair Display',serif; font-size:clamp(1.8rem,4vw,2.4rem); font-weight:900; color:var(--cream); }
  .result-screen-sub { font-size:0.92rem; color:var(--text-muted); line-height:1.6; }

  .result-score-row { display:flex; gap:1rem; width:100%; }
  .result-score-box { flex:1; background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08); border-radius:var(--radius); padding:1.1rem; }
  .result-score-box.accent { background:rgba(52,211,153,0.08); border-color:rgba(52,211,153,0.25); }
  .result-score-num { font-family:'Playfair Display',serif; font-size:2rem; font-weight:700; color:var(--cream); line-height:1; }
  .result-score-box.accent .result-score-num { color:var(--green); }
  .result-score-label { font-size:0.7rem; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.07em; margin-top:0.2rem; }

  .unlock-banner { width:100%; background:rgba(245,158,11,0.1); border:1px solid rgba(245,158,11,0.3); border-radius:var(--radius); padding:1rem 1.2rem; display:none; }
  .unlock-banner.visible { display:block; }
  .unlock-banner-title { font-size:0.72rem; font-weight:600; letter-spacing:0.1em; text-transform:uppercase; color:var(--gold); margin-bottom:0.3rem; }
  .unlock-banner-text { font-size:0.88rem; color:var(--text-light); }

  .result-btns { display:flex; gap:0.7rem; width:100%; }
  .btn-try-again { flex:1; padding:0.85rem; background:var(--red); border:none; border-radius:var(--radius-sm); color:#fff; font-family:'DM Sans',sans-serif; font-size:0.95rem; font-weight:600; cursor:pointer; transition:transform 0.15s, opacity 0.15s; }
  .btn-try-again:hover { transform:translateY(-2px); opacity:0.9; }
  .btn-back-map { padding:0.85rem 1.1rem; background:transparent; border:1px solid rgba(255,255,255,0.15); border-radius:var(--radius-sm); color:var(--text-muted); font-family:'DM Sans',sans-serif; font-size:0.95rem; cursor:pointer; transition:all 0.15s; }
  .btn-back-map:hover { border-color:rgba(255,255,255,0.3); color:var(--text-light); }

  footer { position:relative; z-index:1; text-align:center; padding:1.5rem; border-top:1px solid rgba(255,255,255,0.06); color:var(--text-muted); font-size:0.8rem; margin-top:2rem; }
  footer a { color:var(--teal-light); text-decoration:none; }

  /* toast */
  .toast { position:fixed; bottom:2rem; left:50%; transform:translateX(-50%) translateY(20px); background:var(--cream); color:var(--navy); padding:0.6rem 1.2rem; border-radius:100px; font-size:0.85rem; font-weight:600; opacity:0; transition:all 0.25s ease; pointer-events:none; z-index:100; white-space:nowrap; }
  .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

  /* ══════════════════════════════════════
     INLINE CHALLENGE
  ══════════════════════════════════════ */
  .challenge-block {
    margin-top:1.1rem;
    background:rgba(255,255,255,0.03);
    border:1px solid rgba(255,255,255,0.1);
    border-radius:var(--radius);
    padding:1.1rem 1.3rem 1.3rem;
    animation:slide-up 0.3s ease both;
  }
  .challenge-label {
    font-size:0.68rem; font-weight:700; letter-spacing:0.12em;
    text-transform:uppercase; color:var(--text-muted);
    margin-bottom:0.6rem; display:flex; align-items:center; gap:0.5rem;
  }
  .challenge-label::after { content:''; flex:1; height:1px; background:rgba(255,255,255,0.07); }
  .challenge-question { font-size:1rem; font-weight:600; color:var(--cream); margin-bottom:0.85rem; line-height:1.4; }
  .challenge-options { display:flex; flex-direction:column; gap:0.45rem; }
  .challenge-options.two-col { display:grid; grid-template-columns:1fr 1fr; gap:0.45rem; }
  .challenge-opt {
    padding:0.72rem 1rem; background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.1); border-radius:var(--radius-sm);
    color:var(--text-light); font-family:'DM Sans',sans-serif;
    font-size:0.88rem; font-weight:500; cursor:pointer; text-align:left;
    transition:background 0.12s, border-color 0.12s, transform 0.1s;
  }
  .challenge-opt:hover:not(:disabled) { background:rgba(255,255,255,0.1); border-color:rgba(255,255,255,0.22); transform:translateY(-1px); }
  .challenge-opt:disabled { cursor:default; }
  .challenge-opt.opt-correct { background:rgba(52,211,153,0.18); border-color:var(--green); color:#fff; }
  .challenge-opt.opt-wrong   { background:rgba(244,63,94,0.18);  border-color:var(--red);   color:#fff; }
  .challenge-feedback { margin-top:0.85rem; font-size:0.87rem; line-height:1.5; padding:0.65rem 0.9rem; border-radius:var(--radius-sm); display:none; }
  .challenge-feedback.fb-correct { display:block; background:rgba(52,211,153,0.1); color:var(--green); border:1px solid rgba(52,211,153,0.25); }
  .challenge-feedback.fb-wrong   { display:block; background:rgba(244,63,94,0.08); color:#fca5a5; border:1px solid rgba(244,63,94,0.22); }

</style>
</head>

function byContinent(id) { return ALL_COUNTRIES.filter(c => c.continent === id); }
function flagUrl(code)    { return `https://flagcdn.com/w320/${code}.png`; }
function shuffle(arr)     { return [...arr].sort(() => Math.random() - 0.5); }

// ── STORAGE ───────────────────────────────────────────────────────────────
const STORE_KEY = 'flagatlas_adventure';
function getStore()  { try { return JSON.parse(localStorage.getItem(STORE_KEY)||'{}'); } catch(e) { return {}; } }
function setStore(v) { try { localStorage.setItem(STORE_KEY, JSON.stringify(v)); } catch(e){} }

function isUnlocked(id) {
  const s = getStore();
  const idx = CONTINENTS.findIndex(c => c.id === id);
  if (idx === 0) return true; // Europe always unlocked
  return !!s[`completed_${CONTINENTS[idx-1].id}`];
}
function isCompleted(id) { return !!getStore()[`completed_${id}`]; }
function markCompleted(id) { const s = getStore(); s[`completed_${id}`] = true; setStore(s); }

// ── STATE ─────────────────────────────────────────────────────────────────
let activeContinentId = null;
let learnCountries = [], learnIdx = 0;
let learnScore = 0, challengeAnswered = false;


// ── SCREENS ───────────────────────────────────────────────────────────────
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}

// ══ MAP ═══════════════════════════════════════════════════════════════════
function renderMap() {
  const grid = document.getElementById('continentsGrid');
  grid.innerHTML = '';

  let totalDone = 0, totalAll = ALL_COUNTRIES.length;

  CONTINENTS.forEach(c => {
    const countries = byContinent(c.id);
    const unlocked  = isUnlocked(c.id);
    const completed = isCompleted(c.id);
    if (completed) totalDone += countries.length;

    const card = document.createElement('div');
    card.className = 'continent-card' + (completed ? ' completed' : '') + (!unlocked ? ' locked' : '');
    card.style.setProperty('--c-accent', c.color);

    let badgeHtml = unlocked
      ? (completed
          ? `<span class="status-badge badge-completed">✓ Complete</span>`
          : `<span class="status-badge badge-unlocked">▶ Play</span>`)
      : `<span class="status-badge badge-locked">🔒 Locked</span>`;

    // show a few sample flags
    const sampleFlags = countries.slice(0,8).map(co =>
      `<img src="${flagUrl(co.code)}" alt="${co.name}" loading="lazy">`
    ).join('');

    card.innerHTML = `
      <div class="continent-card-inner">
        <div class="continent-icon">${c.emoji}</div>
        <div class="continent-info">
          <div class="continent-name">${c.label}</div>
          <div class="continent-meta">${countries.length} countries · ${c.desc}</div>
        </div>
        <div class="continent-status">${badgeHtml}</div>
      </div>
      <div class="continent-flags">${sampleFlags}</div>`;

    if (unlocked) {
      card.addEventListener('click', () => startLearn(c.id));
    } else {
      card.addEventListener('click', () => {
        const prev = CONTINENTS[CONTINENTS.findIndex(x=>x.id===c.id)-1];
        showToast(`Complete ${prev.label} first to unlock this!`);
      });
    }
    grid.appendChild(card);
  });

  // overall progress
  const pct = Math.round((totalDone / totalAll) * 100);
  document.getElementById('overallPct').textContent = pct + '%';
  document.getElementById('overallBar').style.width = pct + '%';

  showScreen('mapScreen');
}

// ══ LEARN ═════════════════════════════════════════════════════════════════
function startLearn(continentId) {
  activeContinentId = continentId;
  const conf = CONTINENTS.find(c => c.id === continentId);
  learnCountries = byContinent(continentId);
  learnIdx = 0;
  learnScore = 0;
  challengeAnswered = false;

  document.getElementById('learnTitle').textContent = conf.emoji + ' ' + conf.label;
  document.getElementById('learnScreen').style.setProperty('--learn-color', conf.color);
  document.getElementById('learnProgressFill').style.background = conf.color;

  renderLearnCard();
  showScreen('learnScreen');
}

function renderLearnCard() {
  const c = learnCountries[learnIdx];
  const conf = CONTINENTS.find(x => x.id === activeContinentId);
  challengeAnswered = false;

  document.getElementById('learnProgressLabel').textContent = `${learnIdx+1} of ${learnCountries.length}`;
  document.getElementById('learnProgressFill').style.width = ((learnIdx+1)/learnCountries.length*100) + '%';

// ── CHALLENGE BUILDER ────────────────────────────────────────────────────
function buildChallenge(country) {
  const type = pickChallengeType(country);
  return buildChallengeHTML(type, country);
}

function pickChallengeType(country) {
  // Cycle through types based on index for variety
  const types = ['capital', 'symbolism', 'funfact', 'capital', 'symbolism'];
  return types[learnIdx % types.length];
}

function otherCountries(exclude, n) {
  const pool = learnCountries.filter(c => c.code !== exclude.code);
  const full = pool.length >= n ? pool : [...pool, ...ALL_COUNTRIES.filter(c => c.code !== exclude.code && !pool.find(p=>p.code===c.code))];
  return shuffle(full).slice(0, n);
}

function buildChallengeHTML(type, c) {
  let question, options, correct, explanation;

  if (type === 'capital') {
    const wrong = otherCountries(c, 3).map(x => x.capital);
    const opts = shuffle([c.capital, ...wrong]);
    question = `What is the capital of ${c.name}?`;
    options = opts.map(o => ({ text: o, isCorrect: o === c.capital }));
    explanation = `The capital of ${c.name} is <strong>${c.capital}</strong>.`;

  } else if (type === 'symbolism') {
    // True/false: is this the correct symbolism?
    const coinFlip = Math.random() > 0.5;
    const otherC = otherCountries(c, 1)[0];
    const shownText = coinFlip ? c.symbolism : (otherC ? otherC.symbolism : c.symbolism);
    const isTrue = coinFlip || !otherC;
    question = `True or false? "${shownText}"`;
    options = [
      { text: "✅ True", isCorrect: isTrue },
      { text: "❌ False", isCorrect: !isTrue }
    ];
    explanation = isTrue
      ? `Correct! That is indeed the symbolism for ${c.name}'s flag.`
      : `That was actually the symbolism for ${otherC ? otherC.name : 'another country'}. ${c.name}'s flag: ${c.symbolism}`;

  } else { // funfact — which fact is real?
    const others = otherCountries(c, 2);
    const opts = shuffle([{ text: c.funFact, isCorrect: true }, ...others.map(x => ({ text: x.funFact, isCorrect: false }))]);
    question = `Which of these is a true fact about ${c.name}?`;
    options = opts;
    explanation = `The true fact: "${c.funFact}"`;
  }

  const twoCol = options.length === 2;
  const optionsHTML = options.map((o, i) =>
    `<button class="challenge-opt" data-correct="${o.isCorrect}" style="animation-delay:${i*0.06}s">${o.text}</button>`
  ).join('');

  return `
    <div class="challenge-block">
      <div class="challenge-label">🎯 Quick challenge</div>
      <div class="challenge-question">${question}</div>
      <div class="challenge-options${twoCol ? ' two-col' : ''}">${optionsHTML}</div>
      <div class="challenge-feedback" id="challengeFeedback" data-explanation="${explanation.replace(/"/g,"'")}">${explanation}</div>
    </div>`;
}

function handleChallengeAnswer(btn) {
  if (challengeAnswered) return;
  challengeAnswered = true;

  const isCorrect = btn.dataset.correct === 'true';
  const block = btn.closest('.challenge-block');
  const feedback = block.querySelector('.challenge-feedback');
  const explanation = feedback.dataset.explanation;

  // Disable all options
  block.querySelectorAll('.challenge-opt').forEach(b => {
    b.disabled = true;
    if (b.dataset.correct === 'true') b.classList.add('opt-correct');
  });

  if (isCorrect) {
    btn.classList.add('opt-correct');
    feedback.className = 'challenge-feedback fb-correct';
    feedback.innerHTML = '✓ Correct! ' + explanation;
    learnScore++;
  } else {
    btn.classList.add('opt-wrong');
    feedback.className = 'challenge-feedback fb-wrong';
    feedback.innerHTML = '✗ Not quite. ' + explanation;
    block.classList.add('shake');
    setTimeout(() => block.classList.remove('shake'), 400);
  }

  // Show the next button
  const isLast = learnIdx === learnCountries.length - 1;
  const next = document.getElementById('btnLearnNext');
  const conf = CONTINENTS.find(x => x.id === activeContinentId);
  next.style.display = '';
  next.textContent = isLast ? `Finish ${conf.label} →` : `Next flag →`;
  next.style.background = conf.color;
  next.style.color = '#fff';
  next.style.border = 'none';
}

document.getElementById('btnLearnNext').addEventListener('click', () => {
  if (!challengeAnswered) return;
  if (learnIdx < learnCountries.length - 1) {
    learnIdx++;
    renderLearnCard();
  } else {
    showContinentResult();
  }
});

document.getElementById('btnLearnPrev').addEventListener('click', () => {
  if (learnIdx > 0) { learnIdx--; renderLearnCard(); }
});

document.getElementById('learnBack').addEventListener('click', renderMap);

// ══ CONTINENT RESULT ══════════════════════════════════════════════════════
function showContinentResult() {
  const total = learnCountries.length;
  const conf  = CONTINENTS.find(c => c.id === activeContinentId);
  const nextIdx = CONTINENTS.findIndex(c => c.id === activeContinentId) + 1;
  const nextCont = CONTINENTS[nextIdx];
  const pct = Math.round(learnScore / total * 100);

  let emoji, title, sub;
  if (pct === 100)     { emoji='🏆'; title='Perfect!';         sub=`You nailed every challenge in ${conf.label}!`; }
  else if (pct >= 70)  { emoji='⭐'; title='Great work!';      sub=`${learnScore}/${total} correct — you really know your ${conf.label} flags.`; }
  else if (pct >= 50)  { emoji='👍'; title='Well done!';       sub=`${learnScore}/${total} correct — a solid run through ${conf.label}.`; }
  else                 { emoji='📚'; title='Keep exploring!';  sub=`${learnScore}/${total} correct — try again to improve your score!`; }

  document.getElementById('resultEmoji').textContent = emoji;
  document.getElementById('resultTitle').textContent = title;
  document.getElementById('resultSub').textContent   = sub;
  document.getElementById('rScore').textContent  = learnScore;
  document.getElementById('rTotal').textContent  = total;
  document.getElementById('rPct').textContent    = pct + '%';

  markCompleted(activeContinentId);
  const banner = document.getElementById('unlockBanner');
  if (nextCont) {
    banner.classList.add('visible');
    document.getElementById('unlockText').textContent = `You've unlocked ${nextCont.emoji} ${nextCont.label}! Head back to the map to continue your adventure.`;
  } else {
    banner.classList.add('visible');
    document.getElementById('unlockText').textContent = `You've completed every continent! You're a true flag explorer. 🌍🌎🌏`;
  }

  document.getElementById('btnTryAgain').style.background = conf.color;
  document.getElementById('btnTryAgain').textContent = 'Try again';
  showScreen('resultScreen');
}

document.getElementById('btnTryAgain').addEventListener('click', () => startLearn(activeContinentId));
document.getElementById('btnBackMap').addEventListener('click', renderMap);

// ── KEYBOARD SHORTCUT ─────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (!document.getElementById('learnScreen').classList.contains('active')) return;
  const map = {'1':0,'2':1,'3':2,'4':3};
  const idx = map[e.key];
  if (idx !== undefined) {
    const btns = document.querySelectorAll('.challenge-opt:not(:disabled)');
    if (btns[idx]) btns[idx].click();
  }
});

// ── TOAST ─────────────────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2800);
}

// ── INIT ──────────────────────────────────────────────────────────────────
renderMap();
</script>
</body>
</html>
