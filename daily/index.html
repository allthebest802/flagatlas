<style>
  :root {
    --navy:       #0f1f3d;
    --navy-mid:   #162847;
    --navy-light: #1e3460;
    --teal:       #0d9488;
    --teal-light: #14b8a6;
    --gold:       #f59e0b;
    --cream:      #fef9f0;
    --text-light: #e2e8f0;
    --text-muted: #94a3b8;
    --green:      #34d399;
    --red:        #f43f5e;
    --amber:      #fbbf24;
    --radius:     16px;
    --radius-sm:  10px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family:'DM Sans',sans-serif;
    background:var(--navy);
    color:var(--text-light);
    min-height:100vh;
    overflow-x:hidden;
  }
  body::before {
    content:''; position:fixed; inset:0;
    background-image:
      linear-gradient(rgba(255,255,255,0.025) 1px,transparent 1px),
      linear-gradient(90deg,rgba(255,255,255,0.025) 1px,transparent 1px);
    background-size:40px 40px;
    pointer-events:none; z-index:0;
  }

  /* ── NAV ── */
  nav {
    position:relative; z-index:10;
    display:flex; align-items:center; justify-content:space-between;
    padding:1rem 1.5rem;
    border-bottom:1px solid rgba(255,255,255,0.08);
  }
  .nav-logo { display:flex; align-items:center; gap:0.5rem; text-decoration:none; }
  .nav-logo-icon { width:32px; height:32px; background:var(--teal); border-radius:7px; display:flex; align-items:center; justify-content:center; font-size:16px; }
  .nav-logo-text { font-family:'Playfair Display',serif; font-size:1.25rem; font-weight:700; color:var(--cream); }
  .nav-logo-text span { color:var(--teal-light); }
  .nav-back { font-size:0.82rem; color:var(--text-muted); text-decoration:none; transition:color 0.15s; }
  .nav-back:hover { color:var(--teal-light); }

  /* ── PAGE ── */
  .page {
    position:relative; z-index:1;
    max-width:560px; margin:0 auto;
    padding:1.5rem 1.5rem 4rem;
    display:flex; flex-direction:column; align-items:center; gap:1.4rem;
  }

  /* ── DATE HEADER ── */
  .date-header { text-align:center; }
  .date-label {
    font-size:0.72rem; font-weight:600; letter-spacing:0.12em; text-transform:uppercase;
    color:var(--teal-light); margin-bottom:0.3rem;
  }
  .date-full {
    font-family:'Playfair Display',serif;
    font-size:1.5rem; font-weight:700; color:var(--cream);
  }

  /* ── STREAK BAR ── */
  .streak-bar {
    display:flex; gap:1.5rem; justify-content:center;
    background:rgba(255,255,255,0.04);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:var(--radius); padding:0.9rem 1.5rem;
    width:100%;
  }
  .streak-item { text-align:center; }
  .streak-num {
    font-family:'Playfair Display',serif;
    font-size:1.6rem; font-weight:700; color:var(--gold); line-height:1;
  }
  .streak-label { font-size:0.68rem; color:var(--text-muted); letter-spacing:0.08em; text-transform:uppercase; margin-top:0.15rem; }

  /* ── FLAG DISPLAY ── */
  .flag-wrap {
    width:100%; border-radius:var(--radius); overflow:hidden;
    background:rgba(0,0,0,0.3);
    border:1px solid rgba(255,255,255,0.08);
    position:relative;
  }
  .flag-wrap img {
    width:100%; display:block; max-height:240px; object-fit:contain;
    padding:1.2rem; background:rgba(0,0,0,0.2);
  }
  /* blur overlay — removed when solved */
  .flag-blur-overlay {
    position:absolute; inset:0;
    backdrop-filter:blur(0px);
    transition:backdrop-filter 0.6s ease;
    pointer-events:none;
  }
  .flag-blur-overlay.blurred { backdrop-filter:blur(18px); }

  /* attempts counter dots */
  .attempt-dots {
    display:flex; gap:0.4rem; justify-content:center;
    padding:0.8rem 0 0;
  }
  .attempt-dot {
    width:10px; height:10px; border-radius:50%;
    background:rgba(255,255,255,0.1);
    border:1px solid rgba(255,255,255,0.15);
    transition:all 0.3s ease;
  }
  .attempt-dot.used   { background:var(--red);   border-color:var(--red); }
  .attempt-dot.active { background:var(--gold);  border-color:var(--gold); animation:pulse-dot 1s ease infinite; }
  .attempt-dot.won    { background:var(--green); border-color:var(--green); }
  @keyframes pulse-dot { 0%,100%{transform:scale(1)} 50%{transform:scale(1.3)} }

  /* ── HINTS ── */
  .hints-row {
    display:flex; gap:0.6rem; width:100%; flex-wrap:wrap;
  }
  .hint-chip {
    display:flex; align-items:center; gap:0.4rem;
    padding:0.4rem 0.8rem;
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:100px;
    font-size:0.78rem; color:var(--text-muted);
    transition:all 0.4s ease;
  }
  .hint-chip.revealed {
    background:rgba(20,184,166,0.12);
    border-color:rgba(20,184,166,0.3);
    color:var(--text-light);
  }
  .hint-chip .hint-icon { font-size:0.9rem; }
  .hint-chip .hint-label { font-weight:600; }
  .hint-chip .hint-val { color:var(--teal-light); }

  /* ── GUESS LOG ── */
  .guess-log {
    width:100%; display:flex; flex-direction:column; gap:0.5rem;
    min-height:60px;
  }
  .guess-row {
    display:flex; align-items:center; gap:0.7rem;
    padding:0.6rem 0.9rem;
    background:rgba(255,255,255,0.04);
    border:1px solid rgba(255,255,255,0.07);
    border-radius:var(--radius-sm);
    animation:slide-in 0.25s ease both;
  }
  @keyframes slide-in {
    from { opacity:0; transform:translateX(-12px); }
    to   { opacity:1; transform:translateX(0); }
  }
  .guess-row img {
    width:36px; height:24px; object-fit:cover;
    border-radius:3px; flex-shrink:0;
  }
  .guess-row-name { font-size:0.88rem; color:var(--text-light); flex:1; }
  .guess-row-badge {
    font-size:0.72rem; font-weight:600; padding:0.2rem 0.6rem;
    border-radius:100px; white-space:nowrap;
  }
  .badge-wrong    { background:rgba(244,63,94,0.15);   color:var(--red);   border:1px solid rgba(244,63,94,0.3); }
  .badge-close    { background:rgba(251,191,36,0.15);  color:var(--amber); border:1px solid rgba(251,191,36,0.3); }
  .badge-correct  { background:rgba(52,211,153,0.15);  color:var(--green); border:1px solid rgba(52,211,153,0.3); }

  /* ── INPUT AREA ── */
  .input-area { width:100%; position:relative; }

  #guessInput {
    width:100%; padding:0.85rem 1rem;
    background:rgba(255,255,255,0.06);
    border:1px solid rgba(255,255,255,0.12);
    border-radius:var(--radius-sm);
    color:var(--text-light); font-family:'DM Sans',sans-serif; font-size:0.95rem;
    outline:none; transition:border-color 0.2s;
  }
  #guessInput:focus { border-color:var(--gold); }
  #guessInput::placeholder { color:var(--text-muted); }
  #guessInput:disabled { opacity:0.4; cursor:default; }

  /* autocomplete dropdown */
  .autocomplete {
    position:absolute; top:calc(100% + 4px); left:0; right:0; z-index:50;
    background:var(--navy-mid);
    border:1px solid rgba(255,255,255,0.12);
    border-radius:var(--radius-sm);
    overflow:hidden; max-height:220px; overflow-y:auto;
    box-shadow:0 8px 32px rgba(0,0,0,0.4);
  }
  .autocomplete-item {
    display:flex; align-items:center; gap:0.6rem;
    padding:0.65rem 1rem; cursor:pointer;
    transition:background 0.12s;
    font-size:0.88rem;
  }
  .autocomplete-item:hover, .autocomplete-item.focused {
    background:rgba(255,255,255,0.07);
  }
  .autocomplete-item img {
    width:32px; height:21px; object-fit:cover; border-radius:3px; flex-shrink:0;
  }

  .btn-guess {
    width:100%; margin-top:0.6rem; padding:0.85rem;
    background:var(--gold); border:none; border-radius:var(--radius-sm);
    color:var(--navy); font-family:'DM Sans',sans-serif;
    font-size:1rem; font-weight:700; cursor:pointer;
    transition:transform 0.15s, opacity 0.15s;
    letter-spacing:0.01em;
  }
  .btn-guess:hover:not(:disabled) { transform:translateY(-2px); opacity:0.9; }
  .btn-guess:disabled { opacity:0.35; cursor:default; }

  /* error shake */
  @keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-6px)} 40%{transform:translateX(6px)} 60%{transform:translateX(-4px)} 80%{transform:translateX(4px)} }
  .shake { animation:shake 0.35s ease; }

  /* ── RESULT PANEL ── */
  .result-panel {
    display:none; width:100%;
    background:rgba(255,255,255,0.04);
    border:1px solid rgba(255,255,255,0.1);
    border-radius:var(--radius);
    overflow:hidden;
  }
  .result-panel.visible { display:block; }

  .result-flag-strip {
    width:100%; height:120px; overflow:hidden; position:relative;
  }
  .result-flag-strip img {
    width:100%; height:100%; object-fit:cover; filter:brightness(0.55);
  }
  .result-flag-strip-overlay {
    position:absolute; inset:0;
    background:linear-gradient(to bottom,transparent 30%,rgba(22,40,71,1) 100%);
  }
  .result-flag-name {
    position:absolute; bottom:0.8rem; left:1.4rem;
    font-family:'Playfair Display',serif;
    font-size:1.8rem; font-weight:900; color:var(--cream); font-style:italic;
  }

  .result-body { padding:1.2rem 1.4rem 1.4rem; }

  .result-outcome {
    display:flex; align-items:center; gap:0.6rem;
    margin-bottom:0.8rem;
  }
  .result-outcome-emoji { font-size:1.6rem; }
  .result-outcome-text {
    font-family:'Playfair Display',serif;
    font-size:1.3rem; font-weight:700; color:var(--cream);
  }
  .result-outcome-sub { font-size:0.82rem; color:var(--text-muted); }

  .result-fact {
    font-size:0.85rem; color:var(--text-light); line-height:1.6;
    padding:0.8rem; background:rgba(255,255,255,0.04);
    border-left:2px solid var(--teal-light);
    border-radius:0 var(--radius-sm) var(--radius-sm) 0;
    margin-bottom:1rem;
  }

  .result-actions { display:flex; gap:0.6rem; }

  .btn-share {
    flex:1; padding:0.75rem;
    background:var(--teal); border:none; border-radius:var(--radius-sm);
    color:#fff; font-family:'DM Sans',sans-serif; font-size:0.9rem; font-weight:600;
    cursor:pointer; transition:transform 0.15s, opacity 0.15s;
    display:flex; align-items:center; justify-content:center; gap:0.4rem;
  }
  .btn-share:hover { transform:translateY(-2px); opacity:0.9; }
  .btn-share.copied { background:var(--green); }

  .btn-explore {
    padding:0.75rem 1rem;
    background:transparent; border:1px solid rgba(255,255,255,0.15);
    border-radius:var(--radius-sm);
    color:var(--text-muted); font-family:'DM Sans',sans-serif; font-size:0.9rem;
    text-decoration:none; display:flex; align-items:center;
    transition:all 0.15s; white-space:nowrap;
  }
  .btn-explore:hover { border-color:rgba(255,255,255,0.3); color:var(--text-light); }

  /* ── NEXT FLAG COUNTDOWN ── */
  .countdown-row {
    display:flex; align-items:center; justify-content:center; gap:0.5rem;
    font-size:0.8rem; color:var(--text-muted); margin-top:0.8rem;
  }
  .countdown-time { font-weight:600; color:var(--gold); font-size:0.88rem; }

  /* ── TOAST ── */
  .toast {
    position:fixed; bottom:2rem; left:50%; transform:translateX(-50%) translateY(20px);
    background:var(--cream); color:var(--navy);
    padding:0.6rem 1.2rem; border-radius:100px;
    font-size:0.85rem; font-weight:600;
    opacity:0; transition:all 0.25s ease;
    pointer-events:none; z-index:100; white-space:nowrap;
  }
  .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
  footer { position:relative; z-index:1; text-align:center; padding:1.5rem; border-top:1px solid rgba(255,255,255,0.06); color:var(--text-muted); font-size:0.8rem; margin-top:2rem; }
  footer a { color:var(--teal-light); text-decoration:none; }
</style>

function flagUrl(code,size) { return `https://flagcdn.com/${size||'w320'}/${code}.png`; }

function formatPop(n) {
  if(n>=1000000000) return (n/1000000000).toFixed(1)+'B';
  if(n>=1000000)    return (n/1000000).toFixed(1)+'M';
  if(n>=1000)       return Math.round(n/1000)+'K';
  return n.toString();
}

// ── DATE & DAILY SEED ─────────────────────────────────────────────────────
function getTodayKey() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function getDailyCountry() {
  const epoch = new Date('2024-01-01');
  const today = new Date(); today.setHours(0,0,0,0);
  const dayIdx = Math.floor((today - epoch) / 86400000) % COUNTRIES.length;
  return COUNTRIES[dayIdx];
}

function formatDateLabel(d) {
  return d.toLocaleDateString('en-GB', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
}

// ── STORAGE ───────────────────────────────────────────────────────────────
const STORE_KEY = 'flagatlas_daily';
function getStore() { try { return JSON.parse(localStorage.getItem(STORE_KEY)||'{}'); } catch(e) { return {}; } }
function setStore(v) { try { localStorage.setItem(STORE_KEY,JSON.stringify(v)); } catch(e){} }

// ── STATE ─────────────────────────────────────────────────────────────────
const MAX_ATTEMPTS = 6;
const HINT_SCHEDULE = [0,1,3,5]; // after attempt 0,1,3,5 reveal hints

let daily, todayKey, guesses, done, acFocusIdx;

// ── INIT ──────────────────────────────────────────────────────────────────
function init() {
  const today = new Date();
  todayKey = getTodayKey();
  daily = getDailyCountry();

  document.getElementById('dateLabel').textContent = formatDateLabel(today);
  document.getElementById('flagImg').src = flagUrl(daily.code,'w640');

  buildAttemptDots();
  loadStats();

  const store = getStore();
  const saved = store[todayKey];

  if (saved) {
    // resume today's game
    guesses = saved.guesses || [];
    done    = saved.done    || false;
    guesses.forEach(g => renderGuessRow(g, false));
    updateDots();
    applyHints();
    if (done) {
      showResult(saved.won, guesses.length);
      document.getElementById('flagBlur').classList.remove('blurred');
      document.getElementById('inputArea').style.display = 'none';
    }
  } else {
    guesses = [];
    done    = false;
  }
}

// ── ATTEMPT DOTS ──────────────────────────────────────────────────────────
function buildAttemptDots() {
  const el = document.getElementById('attemptDots');
  el.innerHTML = '';
  for(let i=0;i<MAX_ATTEMPTS;i++){
    const d = document.createElement('div');
    d.className = 'attempt-dot';
    d.id = `dot-${i}`;
    el.appendChild(d);
  }
}

function updateDots() {
  for(let i=0;i<MAX_ATTEMPTS;i++){
    const d = document.getElementById(`dot-${i}`);
    d.className = 'attempt-dot';
    if(i < guesses.length) {
      d.classList.add(guesses[i].correct ? 'won' : 'used');
    } else if(i === guesses.length && !done) {
      d.classList.add('active');
    }
  }
}

// ── HINTS ─────────────────────────────────────────────────────────────────
function applyHints() {
  const n = guesses.length;
  // hint 1: continent (after attempt 1)
  if(n >= 1) revealHint('hintContinent', daily.continent);
  // hint 2: population size (after attempt 2)
  if(n >= 2) revealHint('hintPopulation', formatPop(daily.population)+' people');
  // hint 3: first letter (after attempt 3)
  if(n >= 3) revealHint('hintInitial', daily.name[0].toUpperCase() + '...');
  // hint 4: capital (after attempt 5 - last resort)
  if(n >= 5) revealHint('hintCapital', daily.capital);
}

function revealHint(id, value) {
  const el = document.getElementById(id);
  if(!el) return;
  el.classList.add('revealed');
  el.querySelector('.hint-val').textContent = value;
}

// ── AUTOCOMPLETE ──────────────────────────────────────────────────────────
const input = document.getElementById('guessInput');
const acEl  = document.getElementById('autocomplete');
acFocusIdx  = -1;

input.addEventListener('input', () => {
  const q = input.value.trim().toLowerCase();
  if(q.length < 2) { acEl.style.display='none'; return; }
  const matches = COUNTRIES
    .filter(c => c.name.toLowerCase().includes(q))
    .slice(0,8);
  if(!matches.length) { acEl.style.display='none'; return; }
  acEl.innerHTML = '';
  acFocusIdx = -1;
  matches.forEach((c,i) => {
    const item = document.createElement('div');
    item.className = 'autocomplete-item';
    item.innerHTML = `<img src="${flagUrl(c.code)}" alt="${c.name}"> ${c.name}`;
    item.addEventListener('mousedown', e => {
      e.preventDefault();
      input.value = c.name;
      acEl.style.display='none';
    });
    acEl.appendChild(item);
  });
  acEl.style.display = 'block';
});

input.addEventListener('keydown', e => {
  const items = acEl.querySelectorAll('.autocomplete-item');
  if(e.key==='ArrowDown') {
    e.preventDefault();
    acFocusIdx = Math.min(acFocusIdx+1, items.length-1);
    items.forEach((it,i)=>it.classList.toggle('focused',i===acFocusIdx));
  } else if(e.key==='ArrowUp') {
    e.preventDefault();
    acFocusIdx = Math.max(acFocusIdx-1,0);
    items.forEach((it,i)=>it.classList.toggle('focused',i===acFocusIdx));
  } else if(e.key==='Enter') {
    e.preventDefault();
    if(acFocusIdx>=0 && items[acFocusIdx]) {
      input.value = items[acFocusIdx].textContent.trim();
      acEl.style.display='none';
    } else {
      submitGuess();
    }
  } else if(e.key==='Escape') {
    acEl.style.display='none';
  }
});

document.addEventListener('click', e => {
  if(!acEl.contains(e.target) && e.target!==input) acEl.style.display='none';
});

// ── GUESS SUBMIT ──────────────────────────────────────────────────────────
document.getElementById('btnGuess').addEventListener('click', submitGuess);

function submitGuess() {
  if(done) return;
  const raw  = input.value.trim();
  const norm = raw.toLowerCase();
  const match = COUNTRIES.find(c => c.name.toLowerCase() === norm);

  if(!match) {
    showToast('Country not found — check your spelling!');
    input.classList.add('shake');
    setTimeout(()=>input.classList.remove('shake'),400);
    return;
  }
  if(guesses.find(g=>g.code===match.code)) {
    showToast("You've already guessed that one!");
    return;
  }

  acEl.style.display = 'none';
  input.value = '';

  const isCorrect = match.code === daily.code;
  // badge: correct / same continent / wrong
  const badgeType = isCorrect ? 'correct'
    : match.continent === daily.continent ? 'close' : 'wrong';
  const badgeText = isCorrect ? '✓ Correct!'
    : match.continent === daily.continent ? '🔥 Same continent!'
    : '✗ Wrong';

  const guess = { code:match.code, name:match.name, badgeType, badgeText, correct:isCorrect };
  guesses.push(guess);

  renderGuessRow(guess, true);
  updateDots();
  applyHints();

  const won  = isCorrect;
  const lost = !won && guesses.length >= MAX_ATTEMPTS;

  if(won || lost) {
    done = true;
    document.getElementById('flagBlur').classList.remove('blurred');
    document.getElementById('inputArea').style.display = 'none';
    setTimeout(()=>showResult(won, guesses.length), 600);
    saveResult(won);
  } else {
    saveProgress();
  }
}

function renderGuessRow(g, animate) {
  const log = document.getElementById('guessLog');
  const row = document.createElement('div');
  row.className = 'guess-row';
  if(!animate) row.style.animation='none';
  row.innerHTML = `
    <img src="${flagUrl(g.code)}" alt="${g.name}">
    <span class="guess-row-name">${g.name}</span>
    <span class="guess-row-badge badge-${g.badgeType}">${g.badgeText}</span>`;
  log.appendChild(row);
  row.scrollIntoView({ behavior:'smooth', block:'nearest' });
}

// ── SAVE ──────────────────────────────────────────────────────────────────
function saveProgress() {
  const store = getStore();
  store[todayKey] = { guesses, done:false };
  setStore(store);
}

function saveResult(won) {
  const store = getStore();
  store[todayKey] = { guesses, done:true, won };

  // streak logic
  const yesterday = new Date(); yesterday.setDate(yesterday.getDate()-1);
  const yKey = `${yesterday.getFullYear()}-${String(yesterday.getMonth()+1).padStart(2,'0')}-${String(yesterday.getDate()).padStart(2,'0')}`;
  const hadYesterday = store[yKey]?.won;

  store.streak     = (won && hadYesterday) ? (store.streak||0)+1 : won ? 1 : 0;
  store.bestStreak = Math.max(store.bestStreak||0, store.streak||0);
  store.played     = (store.played||0)+1;
  store.wins       = (store.wins||0) + (won?1:0);
  setStore(store);
  loadStats();
}

function loadStats() {
  const s = getStore();
  document.getElementById('streakNum').textContent    = s.streak     || 0;
  document.getElementById('bestStreakNum').textContent = s.bestStreak || 0;
  document.getElementById('playedNum').textContent    = s.played     || 0;
  const pct = s.played ? Math.round((s.wins/s.played)*100) : 0;
  document.getElementById('winPctNum').textContent = pct+'%';
}

// ── RESULT ────────────────────────────────────────────────────────────────
function showResult(won, attemptCount) {
  const panel = document.getElementById('resultPanel');
  panel.classList.add('visible');

  document.getElementById('resultFlagImg').src = flagUrl(daily.code,'w640');
  document.getElementById('resultFlagName').textContent = daily.name;

  let emoji, text, sub;
  if(won) {
    if(attemptCount===1)      { emoji='🏆'; text='Incredible!';   sub='First attempt — you are a flag legend.'; }
    else if(attemptCount===2) { emoji='⚡'; text='Outstanding!';   sub='Got it in two — seriously impressive.'; }
    else if(attemptCount===3) { emoji='🎯'; text='Excellent!';     sub='Three attempts — that is great work.'; }
    else if(attemptCount===4) { emoji='✅'; text='Well done!';     sub='Four guesses — solid flag knowledge.'; }
    else if(attemptCount===5) { emoji='😅'; text='Made it!';       sub='Cut it close — but you got there.'; }
    else                      { emoji='😤'; text='Just in time!';  sub='Last guess — what a rescue!'; }
  } else {
    emoji='😔'; text='Unlucky today!'; sub=`The flag was ${daily.name}. Come back tomorrow!`;
  }

  document.getElementById('resultEmoji').textContent = emoji;
  document.getElementById('resultText').textContent  = text;
  document.getElementById('resultSub').textContent   = sub;
  document.getElementById('resultFact').textContent  = daily.funFact;

  startCountdown();
}

// ── SHARE ─────────────────────────────────────────────────────────────────
document.getElementById('btnShare').addEventListener('click', () => {
  const won = guesses[guesses.length-1]?.correct;
  const squares = guesses.map(g => {
    if(g.correct)                    return '🟩';
    if(g.badgeType==='close')        return '🟨';
    return '🟥';
  }).join('');
  const score = won ? guesses.length : 'X';
  const text = `FlagAtlas Daily — ${getTodayKey()}\n${score}/${MAX_ATTEMPTS}\n${squares}\nflagatlas.netlify.app`;

  if(navigator.clipboard) {
    navigator.clipboard.writeText(text).then(()=>{
      document.getElementById('btnShare').textContent = '✓ Copied!';
      document.getElementById('btnShare').classList.add('copied');
      setTimeout(()=>{
        document.getElementById('btnShare').textContent = '📋 Share result';
        document.getElementById('btnShare').classList.remove('copied');
      }, 2000);
    });
  } else {
    showToast('Copy: '+text);
  }
});

// ── COUNTDOWN ─────────────────────────────────────────────────────────────
function startCountdown() {
  function update() {
    const now   = new Date();
    const next  = new Date(); next.setHours(24,0,0,0);
    const diff  = next - now;
    const h = String(Math.floor(diff/3600000)).padStart(2,'0');
    const m = String(Math.floor((diff%3600000)/60000)).padStart(2,'0');
    const s = String(Math.floor((diff%60000)/1000)).padStart(2,'0');
    document.getElementById('countdown').textContent = `${h}:${m}:${s}`;
  }
  update();
  setInterval(update, 1000);
}

// ── TOAST ─────────────────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2500);
}

// ── GO ────────────────────────────────────────────────────────────────────
init();
</script>
